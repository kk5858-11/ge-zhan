name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root Vite 个站)
        run: npm ci

      - name: Build root site → dist
        run: npm run build

      - name: Install & build Next 3D（静态导出到 out）
        working-directory: next-3d-home
        env:
          NEXT_STATIC_BASE_PATH: /ge-zhan/next-3d
        run: |
          npm ci
          npm run build

      - name: Merge Next 静态站 into dist/next-3d
        run: |
          mkdir -p dist/next-3d
          cp -R next-3d-home/out/. dist/next-3d/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
